<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PBA Marketing Budget — JPFY27</title>
<style>
  :root{
    --ink:#16181D; --ink-2:#3A3F49; --muted:#7A8290; --faint:#AAB1BC;
    --paper:#F5F6F8; --card:#FFFFFF; --line:#E4E7EC; --line-2:#EEF0F3;
    --spent:#0E7C66; --spent-bg:#E3F1EC;
    --committed:#B9791C; --committed-bg:#F7EEDD;
    --intended:#5A6B90; --intended-bg:#E9EDF4;
    --primary:#16181D; --danger:#B23A3A;
    --radius:10px; --shadow:0 1px 2px rgba(20,22,26,.06),0 6px 20px rgba(20,22,26,.06);
    --mono:Calibri,Carlito,Candara,"Segoe UI",system-ui,sans-serif;
    --sans:Calibri,Carlito,Candara,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);
       font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  a{color:inherit}

  /* ---------- shell ---------- */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .side{background:var(--card);border-right:1px solid var(--line);
        display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .brand .eyebrow{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .brand h1{font-size:16px;margin:5px 0 2px;font-weight:700;letter-spacing:-.01em}
  .brand .fy{font-size:11px;color:var(--muted)}
  .nav{overflow-y:auto;padding:8px 8px 16px;flex:1}
  .nav .grouplbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);
                 font-weight:600;padding:12px 10px 5px}
  .navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;
           padding:7px 10px;border-radius:8px;font-size:12.5px;color:var(--ink-2);
           border:0;background:none;width:100%;text-align:left;transition:background .12s}
  .navitem:hover{background:var(--line-2)}
  .navitem.active{background:var(--ink);color:#fff}
  .navitem.active .navval{color:#cfd4dd}
  .navitem .navname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .navval{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}

  /* ---------- top bar ---------- */
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(245,246,248,.86);
          backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);
          padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .search{position:relative;flex:1;min-width:160px;max-width:340px}
  .search input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--line);
                border-radius:8px;background:var(--card);font-size:13px}
  .search svg{position:absolute;left:10px;top:9px;color:var(--faint)}
  .seg{display:inline-flex;background:var(--line-2);border-radius:8px;padding:3px}
  .seg button{border:0;background:none;padding:6px 11px;border-radius:6px;font-size:12px;
              color:var(--muted);font-weight:600;white-space:nowrap}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .seg.status button.on[data-s="spent"]{color:var(--spent)}
  .seg.status button.on[data-s="committed"]{color:var(--committed)}
  .seg.status button.on[data-s="intended"]{color:var(--intended)}
  .spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--card);padding:8px 12px;border-radius:8px;
       font-size:12.5px;font-weight:600;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--faint)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#000}
  .menu{position:relative}
  .menu-pop{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);
            border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);
            padding:6px;min-width:200px;display:none;z-index:40}
  .menu-pop.open{display:block}
  .menu-pop button{display:flex;width:100%;gap:8px;align-items:center;border:0;background:none;
                   padding:9px 10px;border-radius:7px;font-size:12.5px;color:var(--ink-2);text-align:left}
  .menu-pop button:hover{background:var(--line-2)}
  .menu-pop hr{border:0;border-top:1px solid var(--line);margin:5px 4px}
  .modebadge{font-size:11px;font-weight:700;padding:5px 9px;border-radius:20px;letter-spacing:.02em}
  .modebadge.view{background:var(--intended-bg);color:var(--intended)}
  .modebadge.edit{background:var(--spent-bg);color:var(--spent)}

  /* ---------- content ---------- */
  .content{padding:22px;max-width:1440px;width:100%}
  .savechip{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--spent)}

  /* allocation bar / hero */
  .hero{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        padding:22px 24px;box-shadow:var(--shadow);margin-bottom:18px}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .hero-top .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .hero-total{font-family:var(--mono);font-size:38px;font-weight:600;letter-spacing:-.02em;margin-top:2px}
  .hero-sub{font-size:12px;color:var(--muted)}
  .allocbar{display:flex;height:38px;border-radius:8px;overflow:hidden;margin-top:18px;background:var(--line-2)}
  .allocbar .seg-b{display:flex;align-items:center;padding:0 12px;color:#fff;font-size:12px;font-weight:600;
                   min-width:0;transition:width .45s cubic-bezier(.4,0,.1,1);white-space:nowrap;overflow:hidden}
  .allocbar .seg-b.spent{background:var(--spent)}
  .allocbar .seg-b.committed{background:var(--committed)}
  .allocbar .seg-b.intended{background:var(--intended)}
  .legend{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
  .legend .lg{display:flex;align-items:center;gap:8px;font-size:12px}
  .legend .sw{width:11px;height:11px;border-radius:3px}
  .legend .lg .v{font-family:var(--mono);font-weight:600}
  .legend .lg .p{color:var(--muted);font-family:var(--mono)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .kpi .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;
          display:flex;align-items:center;gap:7px}
  .kpi .v{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:8px;letter-spacing:-.01em}
  .kpi .s{font-size:11.5px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  .kpi .swx{width:9px;height:9px;border-radius:3px}

  /* tables */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
         box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:12px;
           padding:14px 18px;border-bottom:1px solid var(--line)}
  .panel-h h2{font-size:14px;margin:0;font-weight:700;letter-spacing:-.01em}
  .panel-h .btn{padding:6px 10px;font-size:12px;font-weight:600}
  .panel-h .hgroup{display:flex;gap:10px;align-items:center}
  .panel-h .sub{font-size:11.5px;color:var(--muted)}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{padding:9px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line-2)}
  th:first-child,td:first-child{text-align:left}
  thead th{position:sticky;top:0;background:var(--card);z-index:2;font-size:10.5px;
           letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;
           border-bottom:1px solid var(--line)}
  thead th.month{cursor:default}
  tbody tr:hover{background:#FAFBFC}
  .rowlbl .p{font-weight:600;color:var(--ink)}
  .rowlbl .meta{font-size:10.5px;color:var(--faint);font-family:var(--mono)}
  td.tot,th.tot{font-family:var(--mono);font-weight:600}
  tr.subtotal td{border-top:1px solid var(--line);border-bottom:2px solid var(--line);
                 background:#FAFBFC;font-weight:700}
  tr.subtotal td:first-child{font-weight:700}
  tr.allcat{cursor:pointer}
  tr.allcat td{background:#EEF1F4;font-weight:700;border-top:2px solid var(--line);border-bottom:1px solid var(--line)}
  tr.allcat:hover td{background:#E6EAEF}
  td.allitem{padding-left:24px}
  /* channel chart */
  .chartwrap{position:relative;padding:8px 4px 4px}
  .chartwrap svg{width:100%;height:auto;display:block;overflow:visible}
  .chartwrap svg rect.seg{transition:opacity .12s}
  .chartwrap.hovering svg rect.seg{opacity:.28}
  .chartwrap.hovering svg rect.seg.hl{opacity:1;stroke:var(--ink);stroke-width:1.2}
  .charttip{position:absolute;pointer-events:none;background:var(--ink);color:#fff;border-radius:8px;
            padding:8px 11px;font-size:12px;box-shadow:var(--shadow);opacity:0;transition:opacity .1s;z-index:5;white-space:nowrap}
  .charttip.show{opacity:1}
  .charttip .ctc{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:1px}
  .charttip .ctv{font-family:var(--mono);font-weight:700}
  .charttip .ctm{color:#c2c7d0;font-size:11px}
  .chartaxis text{font-size:10.5px;fill:var(--muted);font-family:var(--sans)}
  .chartaxis line{stroke:var(--line-2)}
  .chlegend{display:flex;flex-wrap:wrap;gap:6px;padding:14px 4px 4px}
  .chip.leg{cursor:pointer}
  .chip.leg .sw{width:10px;height:10px;border-radius:3px;display:inline-block}
  .chip.leg.off{opacity:.4;text-decoration:line-through}
  body.editmode tr[data-id] .rowlbl{cursor:pointer}
  body.editmode tr[data-id] .rowlbl:hover .p{text-decoration:underline dotted;text-underline-offset:2px}
  .catrow{cursor:pointer}
  .catrow:hover{background:var(--line-2)!important}
  .minibar{display:inline-flex;height:8px;width:120px;border-radius:4px;overflow:hidden;background:var(--line-2);vertical-align:middle}
  .minibar i{display:block;height:100%}
  .minibar i.spent{background:var(--spent)}
  .minibar i.committed{background:var(--committed)}
  .minibar i.intended{background:var(--intended)}

  /* editable cells */
  td.cell{font-family:var(--mono);cursor:pointer;position:relative;border-left:2px solid transparent}
  td.cell.spent{border-left-color:var(--spent);background:linear-gradient(0deg,var(--spent-bg),var(--spent-bg)) }
  td.cell.committed{border-left-color:var(--committed)}
  td.cell.intended{border-left-color:var(--intended)}
  td.cell .amt.zero{color:var(--faint)}
  td.cell.spent .amt{color:var(--spent)}
  td.cell.committed .amt{color:var(--committed)}
  td.cell.intended .amt{color:var(--intended)}
  td.cell.dim{opacity:.18}
  td.cell.sel{box-shadow:inset 0 0 0 2px var(--ink);border-radius:3px}
  td.cell.sel .amt{font-weight:700}
  body.editmode td.cell{user-select:none;-webkit-user-select:none}
  body.viewmode td.cell{cursor:default}

  .bulkbar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(30px);
           background:var(--ink);color:#fff;border-radius:12px;padding:8px 10px 8px 16px;
           display:none;align-items:center;gap:12px;box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:85}
  .bulkbar.show{display:flex;transform:translateX(-50%) translateY(0);transition:all .2s}
  .bulkbar .cnt{font-size:13px;font-weight:600;white-space:nowrap}
  .bulkbar .grp{display:flex;gap:6px}
  .bulkbar button{border:0;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700}
  .bulkbar .sb[data-s="spent"]{background:var(--spent);color:#fff}
  .bulkbar .sb[data-s="committed"]{background:var(--committed);color:#fff}
  .bulkbar .sb[data-s="intended"]{background:var(--intended);color:#fff}
  .bulkbar .ghost{background:rgba(255,255,255,.15);color:#fff}
  .bulkbar .ghost:hover{background:rgba(255,255,255,.26)}
  .btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
        padding:1px 5px;border-radius:4px;margin-left:6px;vertical-align:1px}
  .stag.spent{background:var(--spent-bg);color:var(--spent)}
  .stag.committed{background:var(--committed-bg);color:var(--committed)}
  .stag.intended{background:var(--intended-bg);color:var(--intended)}

  .rowact{display:inline-flex;gap:4px;opacity:0;transition:opacity .12s}
  tr:hover .rowact{opacity:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);border-radius:6px;width:26px;height:26px;
           display:inline-grid;place-items:center;color:var(--muted)}
  .iconbtn:hover{color:var(--ink);border-color:var(--faint)}
  .iconbtn.sm{width:22px;height:22px}

  /* cell editor popover */
  .pop{position:fixed;z-index:80;background:var(--card);border:1px solid var(--line);border-radius:12px;
       box-shadow:0 10px 40px rgba(20,22,26,.18);padding:14px;width:250px;display:none}
  .pop.open{display:block}
  .pop .plbl{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .pop .pctx{font-size:12px;color:var(--ink-2);margin:2px 0 10px}
  .pop input.amtin{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;
                   font-family:var(--mono);font-size:16px;font-weight:600;text-align:right}
  .pop input.amtin:focus{outline:2px solid var(--ink);outline-offset:-1px}
  .statuspick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}
  .statuspick button{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 4px;
                     font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
  .statuspick button[data-s="spent"].on{background:var(--spent);border-color:var(--spent);color:#fff}
  .statuspick button[data-s="committed"].on{background:var(--committed);border-color:var(--committed);color:#fff}
  .statuspick button[data-s="intended"].on{background:var(--intended);border-color:var(--intended);color:#fff}
  .pop .prow{display:flex;gap:8px;margin-top:12px}
  .pop .prow .btn{flex:1;justify-content:center}

  /* generic modal */
  .scrim{position:fixed;inset:0;background:rgba(20,22,26,.42);z-index:70;display:none;align-items:center;justify-content:center;padding:20px}
  .scrim.open{display:flex}
  .modal{background:var(--card);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.3);
         width:100%;max-width:440px;padding:22px}
  .modal h3{margin:0 0 4px;font-size:16px}
  .modal p{margin:0 0 14px;color:var(--muted);font-size:13px}
  .modal label{display:block;font-size:12px;font-weight:600;margin:10px 0 5px}
  .modal input,.modal select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

  /* toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
         background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;
         box-shadow:var(--shadow);opacity:0;transition:all .25s;z-index:90;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .hint{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:7px;
        padding:10px 14px;background:var(--intended-bg);border-radius:8px;margin-bottom:16px}
  .hint b{color:var(--intended)}
  .hint button{margin-left:auto;border:0;background:none;color:var(--intended);font-weight:600;text-decoration:underline}

  /* overview category multi-select */
  .ovbar{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
         padding:12px 14px;margin-bottom:16px;box-shadow:var(--shadow)}
  .ovbar .ovhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .ovbar .ovhead .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .ovbar .ovhead .foc{font-size:12px;color:var(--muted)}
  .ovbar .ovhead .foc b{color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:6px 11px;
        font-size:12px;font-weight:600;color:var(--ink-2);display:inline-flex;gap:6px;align-items:center;cursor:pointer;transition:all .12s}
  .chip:hover{border-color:var(--faint)}
  .chip .cv{font-family:var(--mono);color:var(--muted);font-weight:600;font-size:11px}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.active .cv{color:#cfd4dd}
  .chip.spentf.active{background:var(--spent);border-color:var(--spent)}
  .chip.committedf.active{background:var(--committed);border-color:var(--committed)}
  .chip.intendedf.active{background:var(--intended);border-color:var(--intended)}
  .chip.util{border-style:dashed;color:var(--muted);background:none}
  .allocbar .seg-b.dim{opacity:.26}
  .kpi.focus{box-shadow:inset 0 0 0 2px currentColor}
  tr.dimrow{opacity:.34}
  th.focuscol,td.focuscol{background:rgba(20,22,26,.035)}

  .lockscreen{position:fixed;inset:0;background:var(--paper);z-index:100;display:none;
              align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .lockscreen.open{display:flex}
  .lockcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px;width:320px;text-align:center;box-shadow:var(--shadow)}
  .lockcard h2{margin:6px 0 2px;font-size:18px}
  .lockcard p{color:var(--muted);font-size:12.5px;margin:0 0 16px}

  .menutoggle{display:none}
  @media(max-width:940px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;z-index:60;width:250px;transform:translateX(-100%);
          transition:transform .2s;box-shadow:var(--shadow)}
    .side.open{transform:none}
    .menutoggle{display:inline-grid}
    .kpis{grid-template-columns:1fr 1fr}
    .hero-total{font-size:30px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body class="viewmode">

<div class="lockscreen" id="lockscreen">
  <div class="lockcard">
    <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600">PBA Marketing Budget</div>
    <h2>Enter passcode</h2>
    <p>This budget is passcode-protected on this device.</p>
    <input type="password" id="lockinput" placeholder="Passcode" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;text-align:center;font-size:15px">
    <div style="color:var(--danger);font-size:12px;height:16px;margin-top:6px" id="lockerr"></div>
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:8px" id="lockgo">Unlock</button>
  </div>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="eyebrow">PointsBet Australia</div>
      <h1>Marketing Budget</h1>
      <div class="fy">JPFY27 · Apr 2026 – Mar 2027</div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="iconbtn menutoggle" id="menutoggle" aria-label="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search" placeholder="Search partner or code…">
      </div>
      <div class="seg status" id="statusfilter" title="Isolate a status">
        <button data-s="all" class="on">All</button>
        <button data-s="spent">Spent</button>
        <button data-s="committed">Committed</button>
        <button data-s="intended">Intended</button>
      </div>
      <div class="spacer"></div>

/* ---------- Supabase (SQL database) sync ---------- */
let sb=null, dbEnabled=false, dbTable='budget_line_items', saving=false, lastSaveTs=0, saveTimer=null;
function sbConfig(){ try{ return JSON.parse(localStorage.getItem(KEY+'_sb')||'null'); }catch(e){ return null; } }
function setSbConfig(cfg){ localStorage.setItem(KEY+'_sb',JSON.stringify(cfg)); }
function itemsToRows(){ return state.items.map(it=>({id:it.id,cat:it.cat,code:String(it.code),type:it.type||'',partner:it.partner,cells:it.cells})); }
function rowsToItems(rows){ return rows.map(r=>({id:r.id,cat:r.cat,code:String(r.code),type:r.type||'',partner:r.partner,cells:r.cells})); }
function syncChip(st){
  const c=document.getElementById('savechip'); if(!c) return;
  if(st==='connected') c.innerHTML='<span class="dot"></span> Database · synced';
  else if(st==='syncing') c.innerHTML='<span class="dot" style="background:var(--committed)"></span> Saving…';
  else if(st==='error') c.innerHTML='<span class="dot" style="background:var(--danger)"></span> Sync error';
  else c.innerHTML='<span class="dot"></span> Local only';
}
async function connectDb(cfg,seedIfEmpty){
  if(typeof window.supabase==='undefined'){ toast('Database library not loaded — check your connection'); syncChip('local'); return false; }
  try{
    sb=window.supabase.createClient(cfg.url,cfg.key);
    dbTable=cfg.table||'budget_line_items';
    const {error}=await sb.from(dbTable).select('id').limit(1);
    if(error) throw error;
    dbEnabled=true; setSbConfig(cfg); syncChip('connected');
    await dbLoad(seedIfEmpty);
    subscribeRealtime();
    return true;
  }catch(e){ sb=null; dbEnabled=false; syncChip('local'); toast('Connect failed: '+(e.message||e)); return false; }
}
function disconnectDb(){ dbEnabled=false; sb=null; localStorage.removeItem(KEY+'_sb'); syncChip('local'); toast('Disconnected — now using local storage'); }
async function dbLoad(seedIfEmpty){
  try{
    const {data,error}=await sb.from(dbTable).select('*'); if(error) throw error;
    if((!data||!data.length) && seedIfEmpty){ await dbReplaceAll(freshFromSeed().items); toast('Database seeded with the JPFY27 starting figures'); return; }
    if(data&&data.length){ const pc=state?state.passcode:null; state={items:rowsToItems(data),passcode:pc}; }
    render(); syncChip('connected');
  }catch(e){ syncChip('error'); toast('Load failed: '+(e.message||e)); }
}
function scheduleDbSave(){ syncChip('syncing'); clearTimeout(saveTimer); saveTimer=setTimeout(dbSaveAll,600); }
async function dbSaveAll(){
  if(!dbEnabled) return;
  saving=true; lastSaveTs=Date.now();
  try{ const {error}=await sb.from(dbTable).upsert(itemsToRows()); if(error) throw error; syncChip('connected'); }
  catch(e){ syncChip('error'); toast('Save failed: '+(e.message||e)); }
  finally{ saving=false; lastSaveTs=Date.now(); }
}
async function dbDeleteRow(id){ if(!dbEnabled) return; try{ await sb.from(dbTable).delete().eq('id',id); }catch(e){} }
async function dbReplaceAll(items){
  if(!dbEnabled) return;
  saving=true; lastSaveTs=Date.now(); syncChip('syncing');
  try{
    await sb.from(dbTable).delete().neq('id','__never__');
    const rows=items.map(it=>({id:it.id,cat:it.cat,code:String(it.code),type:it.type||'',partner:it.partner,cells:it.cells}));
    if(rows.length){ const {error}=await sb.from(dbTable).insert(rows); if(error) throw error; }
    state={items:JSON.parse(JSON.stringify(items)),passcode:state?state.passcode:null};
    render(); syncChip('connected');
  }catch(e){ syncChip('error'); toast('Replace failed: '+(e.message||e)); }
  finally{ saving=false; lastSaveTs=Date.now(); }
}
function subscribeRealtime(){
  try{
    sb.channel('budget_'+dbTable).on('postgres_changes',{event:'*',schema:'public',table:dbTable},()=>{
      if(saving || Date.now()-lastSaveTs<2500) return;                 // ignore our own echo
      if(document.getElementById('pop').classList.contains('open') || selection.size) return; // don't clobber active edit
      dbLoad(false);
    }).subscribe();
  }catch(e){}

/* ---------- money ---------- */
const AUD=new Intl.NumberFormat('en-AU',{maximumFractionDigits:0});
function fmt(n){ return '$'+AUD.format(Math.round(n||0)); }
function fmtShort(n){ n=Math.round(n||0); const a=Math.abs(n);
  if(a>=1e6) return '$'+(n/1e6).toFixed(a>=1e7?1:2)+'M';
  if(a>=1e3) return '$'+(n/1e3).toFixed(0)+'k'; return '$'+n; }

/* ---------- aggregation ---------- */
function itemTotal(it){ return it.cells.reduce((s,c)=>s+(c[0]||0),0); }
function itemByStatus(it){ const o={spent:0,committed:0,intended:0};
  it.cells.forEach(c=>{o[c[1]]+=(c[0]||0)}); return o; }
function catItems(cat){ return state.items.filter(i=>i.cat===cat); }
function totalsFor(items){
  const o={spent:0,committed:0,intended:0,total:0,months:Array(12).fill(0),
           mstat:Array.from({length:12},()=>({spent:0,committed:0,intended:0}))};
  items.forEach(it=>it.cells.forEach((c,mi)=>{
    const a=c[0]||0; o.total+=a; o[c[1]]+=a; o.months[mi]+=a; o.mstat[mi][c[1]]+=a;
  }));
  return o;
}
function matches(it){
  if(!query) return true;
  const q=query.toLowerCase();
  return (it.partner||'').toLowerCase().includes(q) || (it.code||'').toLowerCase().includes(q)
      || (it.type||'').toLowerCase().includes(q) || it.cat.toLowerCase().includes(q);
}

function kpi(k,s,v,sub,foc){
  const sw=s?'<span class="swx" style="background:var(--'+s+')"></span>':'';
  const style=(foc&&s)?' style="color:var(--'+s+')"':'';
  return '<div class="kpi'+(foc?' focus':'')+'"'+style+'><div class="k" style="color:var(--muted)">'+sw+k+'</div><div class="v" '
    +(s?'style="color:var(--'+s+')"':'')+'>'+v+'</div><div class="s">'+sub+'</div></div>';
}
function minibar(t){
  const T=t.total||1;
  return '<span class="minibar">'
    +'<i class="spent" style="width:'+(t.spent/T*100)+'%"></i>'
    +'<i class="committed" style="width:'+(t.committed/T*100)+'%"></i>'
    +'<i class="intended" style="width:'+(t.intended/T*100)+'%"></i></span>';
}

/* ============================ SPEND BY CHANNEL (chart) ============================ */
function niceCeil(v){ if(v<=0) return 1; const p=Math.pow(10,Math.floor(Math.log10(v))); const n=v/p;
  const step=n<=1?1:n<=1.5?1.5:n<=2?2:n<=2.5?2.5:n<=5?5:10; return step*p; }
function channelMatrix(){
  const focus=filter, data={};
  CATS.forEach(cat=>data[cat]=Array(12).fill(0));
  state.items.forEach(it=>it.cells.forEach((cell,mi)=>{ if(focus==='all'||cell[1]===focus) data[it.cat][mi]+=cell[0]||0; }));
  return data;
}
function renderChannels(){
  const c=document.getElementById('content');
  const focus=filter;
  const data=channelMatrix();
  const shown=CATS.filter(cat=>!hiddenChannels.has(cat));
  const monthTotals=MONTHS.map((_,mi)=>shown.reduce((s,cat)=>s+data[cat][mi],0));
  const niceMax=niceCeil(Math.max(1,...monthTotals));

  // layout
  const W=920,H=460,L=66,R=18,T=18,B=54, pw=W-L-R, ph=H-T-B;
  const gw=pw/12, bw=Math.min(46,gw*0.62);
  const y=v=>T+ph-(v/niceMax)*ph;
  let svg='<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Spend by channel by month">';
  // gridlines + y labels
  svg+='<g class="chartaxis">';
  const steps=5;
  for(let i=0;i<=steps;i++){ const val=niceMax*i/steps; const yy=y(val);
    svg+='<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'"/>';
    svg+='<text x="'+(L-8)+'" y="'+(yy+3.5)+'" text-anchor="end">'+fmtShort(val)+'</text>'; }
  svg+='</g>';
  // bars
  MONTHS.forEach((m,mi)=>{
    const x0=L+mi*gw+(gw-bw)/2;
    let cy=T+ph;
    shown.forEach(cat=>{
      const v=data[cat][mi]; if(v<=0) return;
      const segH=(v/niceMax)*ph; cy-=segH;
      svg+='<rect class="seg" x="'+x0.toFixed(1)+'" y="'+cy.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+segH.toFixed(1)
        +'" rx="1.5" fill="'+CATCOLORS[cat]+'" data-cat="'+esc(cat)+'" data-mi="'+mi+'" data-val="'+v+'"></rect>';
    });
    svg+='<text class="chartaxis" x="'+(L+mi*gw+gw/2)+'" y="'+(T+ph+18)+'" text-anchor="middle" style="font-size:10.5px;fill:var(--muted)">'+m+'</text>';
  });
  svg+='</svg>';

  const noteScope=focus==='all'?'all spend':SLABEL[focus]+' only';
  let h='<div class="panel"><div class="panel-h"><h2>Spend by channel</h2><div class="hgroup">'
    +'<span class="sub">Monthly spend stacked by channel · '+noteScope+' · hover a segment</span>'
    +'<button class="btn" data-xexport="channels">⬇ Excel</button></div></div>'
    +'<div class="chartwrap" id="chartwrap">'+svg+'<div class="charttip" id="charttip"></div></div>'
    +'<div class="chlegend">';
  CATS.forEach(cat=>{
    const tot=data[cat].reduce((s,v)=>s+v,0);
    h+='<button class="chip leg'+(hiddenChannels.has(cat)?' off':'')+'" data-ch="'+esc(cat)+'">'
      +'<span class="sw" style="background:'+CATCOLORS[cat]+'"></span>'+esc(titlecase(cat))
      +' <span class="cv">'+fmtShort(tot)+'</span></button>';
  });
  h+='</div></div>';
  c.innerHTML=h;

  // legend toggles
  c.querySelectorAll('.chip.leg').forEach(b=>b.onclick=()=>{

/* ---------- selection engine ---------- */
function keyOf(id,mi){ return id+'|'+mi; }
function cellEl(id,mi){ return document.querySelector('td.cell[data-id="'+id+'"][data-mi="'+mi+'"]'); }
function paintSel(){
  document.querySelectorAll('td.cell.sel').forEach(x=>x.classList.remove('sel'));
  selection.forEach(k=>{ const [id,mi]=k.split('|'); const el=cellEl(id,mi); if(el) el.classList.add('sel'); });
  const bar=document.getElementById('bulkbar'), n=selection.size;
  if(n>0 && mode==='edit' && view!=='overview'){ bar.classList.add('show');
    document.getElementById('bulkcnt').textContent=n+' cell'+(n>1?'s':'')+' selected'; }
  else bar.classList.remove('show');
}
function toggleSel(id,mi){ const k=keyOf(id,mi); selection.has(k)?selection.delete(k):selection.add(k); paintSel(); }
function addSel(id,mi){ selection.add(keyOf(id,mi)); paintSel(); }
function clearSel(){ selection.clear(); paintSel(); }
function selectRange(a,b){
  selection.clear();
  const r0=visIds.indexOf(a.id), r1=visIds.indexOf(b.id); if(r0<0||r1<0) return;
  const rlo=Math.min(r0,r1), rhi=Math.max(r0,r1), clo=Math.min(a.mi,b.mi), chi=Math.max(a.mi,b.mi);
  for(let r=rlo;r<=rhi;r++) for(let m=clo;m<=chi;m++) selection.add(keyOf(visIds[r],m));
  paintSel();
}
function onCellDown(e){
  if(mode!=='edit'||e.button!==0) return;
  const td=e.currentTarget, id=td.dataset.id, mi=+td.dataset.mi;
  e.preventDefault();
  if(e.shiftKey && lastClicked){ selectRange(lastClicked,{id,mi}); moved=true; dragging=false; lastClicked={id,mi}; return; }
  if(e.ctrlKey||e.metaKey||selectMode){ toggleSel(id,mi); dragging=true; dragAnchor={id,mi}; moved=true; lastClicked={id,mi}; return; }
  dragging=true; dragAnchor={id,mi}; moved=false; lastClicked={id,mi};
}
function onCellEnter(e){
  if(!dragging) return;
  const td=e.currentTarget, id=td.dataset.id, mi=+td.dataset.mi;
  if(selectMode||e.ctrlKey||e.metaKey){ addSel(id,mi); moved=true; }
  else { selectRange(dragAnchor,{id,mi}); moved=true; }
}
function onCellTouch(e){
  if(mode!=='edit'||!selectMode) return;
  const td=e.currentTarget; toggleSel(td.dataset.id,+td.dataset.mi);
}
function onGlobalUp(){
  if(!dragging) return;
  dragging=false;
  if(!moved && !selectMode && dragAnchor){
    const {id,mi}=dragAnchor; const el=cellEl(id,mi); clearSel(); if(el) openCell(id,mi,el);
  }
}

/* ============================ CELL EDITOR ============================ */
let editing=null;
function openCell(id,mi,el){
  const it=state.items.find(i=>i.id===id); if(!it) return;
  editing={id,mi};
  const cell=it.cells[mi];
  const pop=document.getElementById('pop');
  document.getElementById('poplbl').textContent=it.partner;
  document.getElementById('popctx').textContent=MONTHS[mi]+' · '+it.code;
  const amt=document.getElementById('popamt'); amt.value=cell[0]||'';
  pop.querySelectorAll('.statuspick button').forEach(b=>b.classList.toggle('on',b.dataset.s===cell[1]));
  pop.dataset.status=cell[1];
  pop.classList.add('open');
  const r=el.getBoundingClientRect(), pw=250, ph=pop.offsetHeight;
  let x=r.left, y=r.bottom+6;
  if(x+pw>window.innerWidth-12) x=window.innerWidth-pw-12;
  if(y+ph>window.innerHeight-12) y=r.top-ph-6;
  pop.style.left=Math.max(12,x)+'px'; pop.style.top=Math.max(12,y)+'px';
  amt.focus(); amt.select();
}
function closeCell(){ document.getElementById('pop').classList.remove('open'); editing=null; }
function commitCell(){
  if(!editing) return;
  const it=state.items.find(i=>i.id===editing.id);
  const raw=document.getElementById('popamt').value.replace(/[^0-9.-]/g,'');
  const val=Math.round(parseFloat(raw)||0);
  const st=document.getElementById('pop').dataset.status||'intended';
  it.cells[editing.mi]=[val,st];
  save(); closeCell(); render();
}

  const items=state.items;

  let lines=[head.join(',')];

};
const XMONEY='$#,##0;-$#,##0;"–"';
const XINK='FF16181D', XMUTE='FF7A8290', XFAINT='FFAAB1BC', XHEADBG='FFF0F2F4', XLINE='FFCBD2DA';
function xready(){ return typeof window.ExcelJS!=='undefined'; }
function xfont(o){ return Object.assign({name:'Calibri',size:11,color:{argb:XINK}},o); }
function xHeaderRow(row){ row.eachCell(c=>{ c.font=xfont({bold:true}); c.fill={type:'pattern',pattern:'solid',fgColor:{argb:XHEADBG}};
  c.border={bottom:{style:'medium',color:{argb:XLINE}}}; c.alignment={vertical:'middle'}; }); row.height=20; }
function xTitle(ws,text,span){ const r=ws.addRow([text]); ws.mergeCells(r.number,1,r.number,span);
  r.getCell(1).font=xfont({size:13,bold:true}); r.height=24; ws.addRow([]); }
function xMoney(cell,bold){ cell.numFmt=XMONEY; cell.font=xfont(bold?{bold:true}:{}); cell.alignment={horizontal:'right'}; }
async function xSave(wb,name){ const buf=await wb.xlsx.writeBuffer();
  dl(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),name); }
function xName(s){ return 'PBA_Budget_'+String(s).replace(/[^A-Za-z0-9]+/g,'_').replace(/^_|_$/g,'')+'_JPFY27.xlsx'; }
function xLegend(ws,span){
  ws.addRow([]); const r=ws.addRow(['Legend']); r.getCell(1).font=xfont({bold:true,color:{argb:XMUTE},size:10});
  const l=ws.addRow(['Spent','Committed','Intended']);
  ['spent','committed','intended'].forEach((s,i)=>{ const c=l.getCell(i+1);
    c.fill={type:'pattern',pattern:'solid',fgColor:{argb:XSTYLE[s].fill}}; c.font=xfont({bold:true,color:{argb:XSTYLE[s].font},size:10}); c.alignment={horizontal:'center'}; });
}

// Category detail — line items x months, cells coloured by status
async function exportCategoryXlsx(cat){
  if(!xready()){ toast('Excel library offline — exporting CSV'); return exportCsv(); }
  const wb=new ExcelJS.Workbook(); wb.creator='PBA Marketing Budget';
  const ws=wb.addWorksheet(titlecase(cat).slice(0,31));
  ws.columns=[{width:30},{width:11},{width:26}].concat(MONTHS.map(()=>({width:11}))).concat([{width:14}]);
  xTitle(ws,'PointsBet Marketing Budget · '+titlecase(cat)+' · JPFY27',16);
  const hdr=ws.addRow(['Line item','Code','Type'].concat(MONTHS).concat(['Total'])); xHeaderRow(hdr);
  const items=catItems(cat);
  items.forEach(it=>{
    const r=ws.addRow([it.partner,it.code,it.type].concat(it.cells.map(c=>c[0])).concat([itemTotal(it)]));
    r.getCell(1).font=xfont({bold:true});
    r.getCell(2).font=xfont({size:10,color:{argb:XMUTE}});
    r.getCell(3).font=xfont({size:10,color:{argb:XMUTE}});
    for(let m=0;m<12;m++){ const cell=r.getCell(4+m); const st=it.cells[m][1]; cell.numFmt=XMONEY; cell.alignment={horizontal:'right'};
      if(it.cells[m][0]){ cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:XSTYLE[st].fill}}; cell.font=xfont({color:{argb:XSTYLE[st].font}}); }
      else cell.font=xfont({color:{argb:XFAINT}}); }
    xMoney(r.getCell(16),true);
  });
  const t=totalsFor(items);
  const sub=ws.addRow(['Subtotal','',''].concat(t.months).concat([t.total]));
  sub.eachCell(c=>{ c.font=xfont({bold:true}); c.border={top:{style:'medium',color:{argb:XLINE}}}; });
  for(let m=0;m<12;m++){ sub.getCell(4+m).numFmt=XMONEY; sub.getCell(4+m).alignment={horizontal:'right'}; }
  sub.getCell(16).numFmt=XMONEY; sub.getCell(16).alignment={horizontal:'right'};
  ws.addRow([]);
  ['spent','committed','intended'].forEach(s=>{ const r=ws.addRow([SLABEL[s],'',''].concat(Array(12).fill('')).concat([t[s]]));
    r.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:XSTYLE[s].fill}}; r.getCell(1).font=xfont({bold:true,color:{argb:XSTYLE[s].font}});
    xMoney(r.getCell(16),true); });
  ws.views=[{state:'frozen',xSplit:1,ySplit:3}];
  await xSave(wb,xName(titlecase(cat))); toast(titlecase(cat)+' exported to Excel');
}

// Whole workbook (More menu) — one coloured sheet per category + overview
async function exportXlsx(){
  if(!xready()){ toast('Excel library offline — exporting CSV instead'); return exportCsv(); }
  const wb=new ExcelJS.Workbook(); wb.creator='PBA Marketing Budget';
  // Overview sheet
  const ov=wb.addWorksheet('Overview');
  ov.columns=[{width:28},{width:15},{width:15},{width:15},{width:15}];
  xTitle(ov,'PointsBet Marketing Budget · JPFY27 · By category',5);
  const h=ov.addRow(['Category','Spent','Committed','Intended','Total']); xHeaderRow(h);
  CATS.forEach(cat=>{ const t=totalsFor(catItems(cat)); const r=ov.addRow([titlecase(cat),t.spent,t.committed,t.intended,t.total]);
    r.getCell(1).font=xfont({bold:true}); for(let i=2;i<=5;i++){ r.getCell(i).numFmt=XMONEY; r.getCell(i).alignment={horizontal:'right'}; } });
  const g=totalsFor(state.items); const tr=ov.addRow(['Total',g.spent,g.committed,g.intended,g.total]);
  tr.eachCell(c=>{ c.font=xfont({bold:true}); c.border={top:{style:'medium',color:{argb:XLINE}}}; });
  for(let i=2;i<=5;i++){ tr.getCell(i).numFmt=XMONEY; tr.getCell(i).alignment={horizontal:'right'}; }
  ov.views=[{state:'frozen',ySplit:3}];
  // one sheet per category
  CATS.forEach(cat=>{
    const items=catItems(cat); if(!items.length) return;
    const ws=wb.addWorksheet(titlecase(cat).slice(0,31).replace(/[\\/?*\[\]:]/g,' '));
    ws.columns=[{width:30},{width:11}].concat(MONTHS.map(()=>({width:11}))).concat([{width:14}]);
    xTitle(ws,titlecase(cat)+' · JPFY27',15);
    const hd=ws.addRow(['Line item','Code'].concat(MONTHS).concat(['Total'])); xHeaderRow(hd);
    items.forEach(it=>{ const r=ws.addRow([it.partner,it.code].concat(it.cells.map(c=>c[0])).concat([itemTotal(it)]));
      r.getCell(1).font=xfont({bold:true}); r.getCell(2).font=xfont({size:10,color:{argb:XMUTE}});
      for(let m=0;m<12;m++){ const cell=r.getCell(3+m); const st=it.cells[m][1]; cell.numFmt=XMONEY; cell.alignment={horizontal:'right'};
        if(it.cells[m][0]){ cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:XSTYLE[st].fill}}; cell.font=xfont({color:{argb:XSTYLE[st].font}}); }
        else cell.font=xfont({color:{argb:XFAINT}}); }
      xMoney(r.getCell(15),true);
    });
    const t=totalsFor(items); const sub=ws.addRow(['Subtotal',''].concat(t.months).concat([t.total]));
    sub.eachCell(c=>{ c.font=xfont({bold:true}); c.border={top:{style:'medium',color:{argb:XLINE}}}; });
    for(let m=0;m<12;m++){ sub.getCell(3+m).numFmt=XMONEY; sub.getCell(3+m).alignment={horizontal:'right'}; }
    sub.getCell(15).numFmt=XMONEY; sub.getCell(15).alignment={horizontal:'right'};
    ws.views=[{state:'frozen',xSplit:1,ySplit:3}];
  });
  await xSave(wb,xName('Full_JPFY27')); toast('Full workbook exported to Excel');
}
function dl(blob,name){ const u=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000); }


/* ============================ MODAL / TOAST / MISC ============================ */
function openModal(html){ const m=document.getElementById('modal'); m.innerHTML=html;
  document.getElementById('scrim').classList.add('open');
  m.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal); }
function closeModal(){ document.getElementById('scrim').classList.remove('open'); }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function dismissHint(){ localStorage.setItem(KEY+'_hintseen','1'); render(); }
function closeSide(){ document.getElementById('side').classList.remove('open'); }

/* ============================ WIRING ============================ */
function boot(){
  state=load();
  if(!state.items){ state=freshFromSeed(); }
  // lock screen
  if(state.passcode){
    const ls=document.getElementById('lockscreen'); ls.classList.add('open');
    const go=()=>{ if(document.getElementById('lockinput').value===state.passcode){ ls.classList.remove('open'); }
      else document.getElementById('lockerr').textContent='Incorrect passcode'; };
    document.getElementById('lockgo').onclick=go;
    document.getElementById('lockinput').onkeydown=e=>{if(e.key==='Enter')go();};
    document.getElementById('lockinput').focus();
  }
  render(); flashSaved();

  // auto-connect to database (saved config, else the baked-in shared connection)
  const cfg=sbConfig()||SB_DEFAULT;
  if(cfg&&cfg.url&&cfg.key){ syncChip('syncing'); connectDb(cfg,false); }

  document.getElementById('search').oninput=e=>{ query=e.target.value.trim(); if(view!=='overview') renderCategory(view); };
  document.querySelectorAll('#statusfilter button').forEach(b=>b.onclick=()=>{
    filter=b.dataset.s; document.querySelectorAll('#statusfilter button').forEach(x=>x.classList.toggle('on',x===b));
    render();
  });
  document.getElementById('modebtn').onclick=toggleMode;
  document.getElementById('menutoggle').onclick=()=>document.getElementById('side').classList.toggle('open');

  // more menu
  const morepop=document.getElementById('morepop');
  document.getElementById('morebtn').onclick=e=>{ e.stopPropagation(); morepop.classList.toggle('open'); };
  document.addEventListener('click',()=>morepop.classList.remove('open'));
  morepop.addEventListener('click',e=>e.stopPropagation());
  morepop.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    morepop.classList.remove('open');
    const a=b.dataset.act;
    if(a==='connectdb'){ connectModal(); }
    else if(a==='autotag'){ requireEdit(autoTag); }
    else if(a==='collapse'){ collapsed=!collapsed; render(); }
    else if(a==='expJson') exportJson();
    else if(a==='impJson') importJson();
    else if(a==='expXlsx') exportXlsx();
    else if(a==='expCsv') exportCsv();
    else if(a==='lock') setPasscode();
    else if(a==='reset') requireEdit(resetAll);
  });

  // cell popover
  document.getElementById('popsave').onclick=commitCell;
  document.getElementById('popcancel').onclick=closeCell;
  document.getElementById('popamt').onkeydown=e=>{ if(e.key==='Enter')commitCell(); if(e.key==='Escape')closeCell(); };
  document.querySelectorAll('#pop .statuspick button').forEach(b=>b.onclick=()=>{
    document.getElementById('pop').dataset.status=b.dataset.s;
    document.querySelectorAll('#pop .statuspick button').forEach(x=>x.classList.toggle('on',x===b));
  });
  document.addEventListener('click',e=>{ const pop=document.getElementById('pop');
    if(pop.classList.contains('open') && !pop.contains(e.target) && !e.target.closest('td.cell')) closeCell(); });

  // import file
  document.getElementById('fileinput').onchange=e=>{
    const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
    rd.onload=()=>{ try{ const obj=JSON.parse(rd.result);
      if(!obj.items) throw 0;
      if(dbEnabled){ dbReplaceAll(obj.items).then(()=>toast('Data imported to database')); }
      else { state=obj; save(); render(); toast('Data imported'); }
    }catch(err){ toast('Could not read that file'); } e.target.value=''; };
    rd.readAsText(f);
  };

  document.getElementById('scrim').onclick=e=>{ if(e.target.id==='scrim') closeModal(); };
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeCell(); clearSel(); } });

  // selection: global mouseup + bulk bar
  document.addEventListener('mouseup',onGlobalUp);
  document.querySelectorAll('#bulkbar .sb').forEach(b=>b.onclick=()=>applyBulkStatus(b.dataset.s));
  document.getElementById('bulkclear').onclick=()=>clearSel();
  document.getElementById('bulkamt').onclick=bulkSetAmount;
}
function requireEdit(fn){
  if(mode!=='edit'){ if(state.passcode){ promptPass('Enter passcode to edit',()=>{setMode('edit');fn();}); return; } setMode('edit'); }
  fn();
}
boot();
</script>
